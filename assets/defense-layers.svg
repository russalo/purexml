<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-label="purexml defends untrusted XML in two layers: purexml's own Python-layer handlers block entity bombs, XXE, and external-DTD resolution version-independently, while the libexpat parser layer mitigates parser-level DoS classes depending on your runtime version; the result is a standard, trusted xml.etree tree.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- panel -->
  <rect x="6" y="6" width="948" height="418" rx="16" fill="#fcfdff" stroke="#e5e9f0" stroke-width="1.5"/>

  <!-- header -->
  <text x="28" y="42" font-size="21" font-weight="700" fill="#0f172a">purexml — defense in two layers</text>
  <text x="28" y="66" font-size="12.5" fill="#475569">Same <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">xml.etree</tspan> result as the stdlib — attacks refused before any expansion, fetch, or file read.</text>

  <!-- pipeline -->
  <line x1="178" y1="125" x2="208" y2="125" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="364" y1="125" x2="394" y2="125" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="550" y1="125" x2="580" y2="125" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="736" y1="125" x2="766" y2="125" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- b1 input -->
  <rect x="28" y="96" width="150" height="58" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="103" y="130" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">Untrusted XML</text>

  <!-- b2 purexml handlers (the star) -->
  <rect x="214" y="96" width="150" height="58" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.6"/>
  <text x="289" y="120" font-size="14" font-weight="700" fill="#4c1d95" text-anchor="middle">purexml</text>
  <text x="289" y="139" font-size="12.5" fill="#5b21b6" text-anchor="middle">blocking handlers</text>

  <!-- b3 expat -->
  <rect x="400" y="96" width="150" height="58" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="1.6"/>
  <text x="475" y="130" font-size="13.5" font-weight="600" fill="#155e75" text-anchor="middle">pyexpat · libexpat</text>

  <!-- b4 treebuilder -->
  <rect x="586" y="96" width="150" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="661" y="120" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle">xml.etree</text>
  <text x="661" y="139" font-size="12.5" fill="#475569" text-anchor="middle">TreeBuilder</text>

  <!-- b5 output -->
  <rect x="772" y="96" width="150" height="58" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="847" y="120" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">Element</text>
  <text x="847" y="139" font-size="12" fill="#15803d" text-anchor="middle">✓ trusted tree</text>

  <!-- connectors to layer bands -->
  <line x1="289" y1="154" x2="289" y2="208" stroke="#a78bda" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="475" y1="154" x2="475" y2="208" stroke="#5eb7c7" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- layer A: purexml -->
  <rect x="40" y="210" width="410" height="118" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.4"/>
  <text x="58" y="237" font-size="14" font-weight="700" fill="#6d28d9">LAYER 1 · blocked by purexml</text>
  <text x="58" y="263" font-size="13" fill="#3f3f46">billion-laughs · quadratic blowup</text>
  <text x="58" y="284" font-size="13" fill="#3f3f46">XXE / external entities · external DTD</text>
  <text x="58" y="312" font-size="11.5" font-style="italic" fill="#7c5cbf">Python layer — version-independent</text>

  <!-- layer B: libexpat -->
  <rect x="470" y="210" width="452" height="118" rx="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.4"/>
  <text x="488" y="237" font-size="14" font-weight="700" fill="#0e7490">LAYER 2 · mitigated by libexpat</text>
  <text x="488" y="263" font-size="13" fill="#3f3f46">large tokens · disproportionate memory</text>
  <text x="488" y="284" font-size="13" fill="#3f3f46">hash-flooding · attribute-collision · int-overflow batch</text>
  <text x="488" y="312" font-size="11.5" font-style="italic" fill="#3d92a3">parser layer — tracks your runtime</text>

  <!-- footer -->
  <text x="28" y="362" font-size="12" fill="#475569"><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">security_report()</tspan>  shows which layer covers each attack class on your interpreter — and whether your libexpat is current.</text>
  <text x="28" y="384" font-size="12" fill="#475569">Opt-in <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">Limits</tspan> adds structural-DoS caps (max_depth / max_attributes / max_bytes) — default-off, on ElementTree, minidom &amp; sax.</text>
  <text x="28" y="406" font-size="11.5" fill="#94a3b8">Zero third-party dependencies · stdlib only · drop-in for defusedxml (s/defusedxml/purexml/).</text>
</svg>
