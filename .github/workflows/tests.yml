name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Lint + typecheck are Python-version-independent — run once, not per matrix entry.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - name: ruff
        run: ruff check src/ tests/ fuzz/ tools/
      - name: mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the declared floor (>=3.10) through current — grounds the floor
        # claim instead of only exercising one version.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite (with coverage gate)
        # --cov-fail-under enforces the floor on every Python in the matrix;
        # currently ~94%, floor set at 90% for headroom.
        run: python -m pytest tests/ -q --cov=purexml --cov-fail-under=90
