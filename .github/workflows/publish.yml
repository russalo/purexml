name: publish

# Publish purexml to PyPI when a GitHub Release is published, via PyPI Trusted
# Publishing (OIDC) — no long-lived API token.
#
# STAGED — not yet live. This workflow only runs when a Release is *published*, and
# the upload step additionally requires:
#   1. the `purexml` name claimed on PyPI, and
#   2. a configured PyPI Trusted Publisher for russalo/purexml (this workflow,
#      environment `pypi`).
# Until both exist (a deliberate strategic call — see docs/ROADMAP-to-1.0.md, gate
# G5), do not create a Release. Committing the workflow is harmless: nothing runs
# without a Release event.
#
# Action refs are pinned to full commit SHAs (OpenSSF / Scorecard supply-chain hardening);
# the trailing `# vN` comment keeps the human-readable version. When bumping an action,
# update BOTH the SHA and the comment. tests.yml is pinned the same way.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify the release tag matches the package version
        # Refuse to publish if the Release tag (e.g. v0.14.1) and pyproject's version
        # disagree — a mismatched tag is the classic way to ship the wrong version.
        # The tag is passed via env, NOT inline ${{ }} in run:, to avoid shell injection
        # from an attacker-controllable tag name.
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "release tag: $TAG   pyproject version: $VERSION"
          if [ "${TAG#v}" != "$VERSION" ]; then
            echo "::error::release tag '$TAG' does not match pyproject version '$VERSION'"
            exit 1
          fi
      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # deployment gate + audit record
    permissions:
      id-token: write          # mint the OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
