name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8
          # Build golangci-lint from source with the runner's Go toolchain. The
          # prebuilt v1.64.8 binary is built with Go 1.24 and refuses to lint a
          # module targeting a newer Go (e.g. go.mod at 1.26); compiling it here
          # avoids that. Keep this until a prebuilt binary catches up to the
          # module's `go` directive.
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        # -race needs cgo; ubuntu-latest has gcc and this job leaves CGO_ENABLED
        # at its default (on). -count=1 bypasses the test result cache so the
        # race build always actually executes (a cached PASS could otherwise
        # mask a flaky race).
        run: go test -race -count=1 ./...
